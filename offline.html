<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RANT — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#e0e0e0;font-family:Arial Black,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
    h1{font-size:48px;color:#ff3b1f;letter-spacing:4px;margin-bottom:16px}
    p{color:#666;font-size:14px;letter-spacing:2px;margin-bottom:8px}
    .dot{width:8px;height:8px;border-radius:50%;background:#ff3b1f;display:inline-block;margin:0 3px;animation:pulse 1.4s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
  <h1>RANT</h1>
  <p>YOU'RE OFFLINE</p>
  <p style="color:#444;font-size:12px;margin-top:8px">the void is unreachable right now</p>
  <div style="margin-top:24px">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
  <p style="color:#333;font-size:11px;margin-top:24px;letter-spacing:1px">check your connection and try again</p>
</body>
</html>
